<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="富士急クイズ">
<link rel="apple-touch-icon" href="icon.png">
<title>富士急ハイランド ライセンス10 クイズ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;background:linear-gradient(135deg,#0d2533,#1a4d5a,#0d3340);color:#fff;min-height:100dvh;overflow-x:hidden}
.screen{display:none;min-height:100dvh}.screen.active{display:flex;flex-direction:column}
#home{padding:20px 16px 40px}
.home-title{text-align:center;padding:20px 0 16px;animation:fadeUp .6s ease-out}
.home-title h1{font-size:28px;font-weight:800}.home-title h2{font-size:18px;opacity:.8;margin-top:4px;color:#cc3333}
.category{margin-bottom:16px}
.cat-header{display:flex;align-items:center;gap:8px;padding:12px 16px;background:rgba(255,255,255,.08);border-radius:10px;cursor:pointer;font-size:16px;font-weight:700;-webkit-tap-highlight-color:transparent}
.cat-header .arrow{transition:transform .2s;font-size:12px}.cat-header.open .arrow{transform:rotate(90deg)}
.cat-header .badge{margin-left:auto;background:rgba(255,255,255,.15);padding:2px 10px;border-radius:20px;font-size:13px;font-weight:400}
.cat-list{display:none;padding:4px 0 0}.cat-header.open+.cat-list{display:block}
.att-btn{display:block;width:100%;text-align:left;padding:14px 16px;margin-top:4px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:8px;color:#fff;font-size:15px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s}
.att-btn:active{background:rgba(255,255,255,.12)}
.att-btn .att-q{float:right;opacity:.5;font-size:13px}
#quiz{padding:0 0 40px}
.quiz-header{position:sticky;top:0;z-index:10;background:rgba(13,37,51,.95);backdrop-filter:blur(8px);padding:12px 16px 8px}
.quiz-att-name{font-size:13px;opacity:.6;margin-bottom:4px;text-align:center}
.progress-bar{width:100%;height:5px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:#cc3333;border-radius:3px;transition:width .3s}
.quiz-info{display:flex;justify-content:space-between;margin-top:8px;font-size:14px;opacity:.7}
.quiz-info .score-text{color:#6c6;opacity:1}
.quiz-body{padding:16px}
.question-box{background:rgba(255,255,255,.1);border-radius:12px;padding:20px;margin-bottom:20px;font-size:17px;font-weight:600;line-height:1.6}
.choices{display:flex;flex-direction:column;gap:12px}
.choice-btn{display:flex;align-items:flex-start;gap:12px;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);border-radius:12px;padding:16px;cursor:pointer;transition:background .2s,border-color .2s;text-align:left;-webkit-tap-highlight-color:transparent}
.choice-btn:active:not(.disabled){background:rgba(255,255,255,.15)}.choice-btn.disabled{cursor:default}
.choice-label{flex-shrink:0;width:30px;height:30px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.2);border-radius:50%;font-weight:700;font-size:15px}
.choice-text{font-size:15px;line-height:1.5;flex:1}.choice-icon{flex-shrink:0;font-size:20px;margin-left:auto}
.choice-btn.correct{background:rgba(0,180,80,.15);border-color:rgba(0,180,80,.5)}.choice-btn.correct .choice-label{background:#0b4}
.choice-btn.wrong{background:rgba(220,50,50,.15);border-color:rgba(220,50,50,.5)}.choice-btn.wrong .choice-label{background:#c33}
.choice-btn.dim{opacity:.4}
.explanation{margin-top:20px;padding:16px;border-radius:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);animation:fadeUp .3s ease-out}
.explanation .result-label{font-size:18px;font-weight:700;margin-bottom:8px}
.explanation .result-label.correct{color:#4c4}.explanation .result-label.wrong{color:#e44}
.explanation p{font-size:14px;line-height:1.7;opacity:.85}
.btn-next{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:20px;padding:16px;background:#cc3333;color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;transition:transform .15s}
.btn-next:active{transform:scale(.97)}
#result{align-items:center;padding:40px 20px}
.result-att-name{font-size:16px;opacity:.7;margin-bottom:8px}
.score-circle{position:relative;width:180px;height:180px;margin:12px 0}
.score-circle svg{width:100%;height:100%;transform:rotate(-90deg)}
.score-circle .bg{fill:none;stroke:rgba(255,255,255,.1);stroke-width:10}
.score-circle .fg{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1s ease-out}
.score-circle .label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.score-circle .num{font-size:52px;font-weight:800}.score-circle .den{font-size:20px;opacity:.6}
.grade{font-size:22px;font-weight:700;margin:8px 0}.percentage{font-size:16px;opacity:.6;margin-bottom:20px}
.toggle-details{background:none;border:none;color:rgba(255,255,255,.5);font-size:14px;cursor:pointer;padding:8px;margin-bottom:12px}
.details{width:100%;max-width:500px}
.detail-item{display:flex;align-items:flex-start;gap:10px;background:rgba(255,255,255,.06);border-radius:10px;padding:14px;margin-bottom:8px}
.detail-item .icon{font-size:20px;flex-shrink:0}.detail-item .info{flex:1}
.detail-item .q{font-size:13px;font-weight:600;line-height:1.4}
.detail-item .ans{font-size:12px;margin-top:4px;opacity:.7}.detail-item .ans.wrong-ans{color:#e66}.detail-item .ans.correct-ans{color:#6c6}
.btn-home{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:24px;padding:16px 48px;background:#cc3333;color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer}
.btn-home:active{transform:scale(.97)}
.btn-back{display:inline-flex;align-items:center;gap:4px;background:none;border:none;color:rgba(255,255,255,.6);font-size:14px;cursor:pointer;padding:8px 0;margin-bottom:8px}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="home" class="screen active">
<div class="home-title"><h1>富士急ハイランド</h1><h2>ライセンス10 クイズ</h2></div>
<div id="catList"></div>
</div>
<div id="quiz" class="screen">
<div class="quiz-header">
<div class="quiz-att-name" id="quizAttName"></div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div class="quiz-info"><span id="qNumber"></span><span class="score-text" id="scoreText">正解数: 0</span></div>
</div>
<div class="quiz-body" id="quizBody"></div>
</div>
<div id="result" class="screen">
<div class="result-att-name" id="resultAttName"></div>
<div class="score-circle"><svg viewBox="0 0 200 200"><circle class="bg" cx="100" cy="100" r="85"/><circle class="fg" id="scoreFg" cx="100" cy="100" r="85"/></svg><div class="label"><div class="num" id="resultScore">0</div><div class="den" id="resultTotal"></div></div></div>
<div class="grade" id="gradeText"></div>
<div class="percentage" id="percentText"></div>
<button class="toggle-details" onclick="toggleDetails()">&#9660; 詳細を見る</button>
<div class="details" id="detailsBox" style="display:none"></div>
<button class="btn-home" onclick="goHome()">&#8634; ホームに戻る</button>
</div>
<script>
const DATA={categories:[
{name:"大型機種",atts:[
{name:"高飛車",questions:[
{q:"高飛車のブレーキではないものを一つ選んでください。",c:["マグネットブレーキ","可動式マグネットブレーキ","ステータブレーキ","レディブレーキ"],a:3,e:"高飛車のブレーキは全4種類：①メカニカルブレーキ ②マグネットブレーキ ③可動式マグネットブレーキ ④ステータブレーキ。「レディブレーキ」は存在しません。"},
{q:"車両横断のルールで、間違っているものを一つ選んでください。",c:["「渡ります」のハンドサインを交わす","P09とP07に停車している車両を渡る","P09の車両を渡る際はオペレーターと、降車の車両を渡る際は降車操作盤のスタッフとハンドサインを交わす","ハンドサインが返って来ない場合は、左右をよく確認し、タイミングを見計らって車両を渡る"],a:3,e:"ハンドサインが返ってこない場合は、車両の横断をしてはなりません。"},
{q:"拘束装置の確認について、順番の正しいものを一つ選んでください。",c:["①腰ベルト ②縦ベルト ③安全バーのロック ④違和感確認","①違和感確認 ②腰ベルト ③縦ベルト ④安全バーのロック","①縦ベルト ②安全バーのロック ③違和感確認 ④腰ベルト","①安全バーのロック ②縦ベルト ③腰ベルト ④違和感"],a:0,e:"正しい順番は：①腰ベルト → ②縦ベルト → ③安全バーロック → ④違和感確認。"},
{q:"高飛車の正しい乗車姿勢のポイントで、正しいものはどれか（プレショー準拠）。",c:["①正面を向く ②背中を背もたれにつける ③安全バーにつかまる","①足をおろしてふくらはぎをクッションに押し付ける ②安全バーにつかまって体を支える ③頭をヘッドレストに押し付ける","①頭を後ろにつける ②背中を後ろにつける ③安全バーにつかまって体を支える","①足を所定の位置におく ②安全バーにしっかりとつかむ ③頭を後ろにつける"],a:2,e:"正しい乗車姿勢：①頭を後ろにつける ②背中も後ろにつける ③安全バーにつかまって体を支える。"},
{q:"高飛車の運転モードは、テストモード、エバケーションモード、通常モードとあと一つは何か？",c:["RUNモード","メンテナンスモード","試運転モード","DISABLEモード"],a:1,e:"運転モードは全4つ：テスト・エバケーション・メンテナンス・通常モード。"},
{q:"エラーは出ていないが出発できないという場合、原因と考えられないものはどれか？",c:["断線","安全バーが規定の位置まで下がっていない","安全バーを上げ切っていなかった","水位の低下"],a:3,e:"「水位の低下」は該当しません。"},
{q:"高飛車のホームポジションとして正しくないものを一つ選んでください。",c:["ビッシャー","ポストショー","プレショー","チェッカー"],a:1,e:"「ポストショー」は存在しません。"},
{q:"通常モードにて運営中、何かの理由でパネル操作キースイッチを「切」にする場合の手順で、正しいものを一つ選んでください。",c:["再度『入』にする際に、メンテナンスモードに切り替える","『切』にする前に、エヴァケーションモードに切り替える","『切』にする前に、メンテナンスモードに切り替える","特に操作は必要ない"],a:2,e:"メンテナンスモードに切り替えてから「切」にすること。"},
{q:"B01で停止した車両を回収する際の注意事項について、正しいモードを選んでください。",c:["メンテナンスモード","通常モード","Jog前進","テストモード"],a:1,e:"通常モードで回収します。"},
{q:"ポジションの交代について、間違っているものを一つ選んでください。",c:["ポジション交代は、確認作業完了後に行う。","ポジション交代のルールは、オペレーターの交代にも適用される。","ポジションを交代するにあたり、時間がかかりそうな場合は、お互いに引継ぎを行えば作業途中で交代することができる。","「確認作業の途中」でスタッフ交代をしてはならない。"],a:2,e:"引継ぎがあっても途中交代は不可です。"},
{q:"「ロックアウト」について正しいものを一つ選んでください。",c:["電源やボタンに「鍵」をすることで、第三者が操作できないようにする仕組みのこと。","危険エリアに「短い時間」入るのであれば鍵をしなくてもよい。","ロックアウトの解除は「お願いすれば」他のスタッフにさせてもよい","急ぎの作業であれば、立入りカードに「名前」の記載は免除される。"],a:0,e:"ロックアウトとは、機械の電源やボタン等に鍵をかけることで、第三者が操作できないようにする仕組みです。"}
]},
{name:"ええじゃないか",questions:[
{q:"降雨時の休止基準について、誤っているものを選びなさい。",c:["大雨特別警報または大雨警報が発令された時","雨がしきりに降り、ブレーキ付近のレールから水がポタポタと垂れるとき","タイヤとレールの摩擦音がギュルギュルとした音が増大する","空が暗くなり、富士山が雲に隠れてしまったら"],a:3,e:"「富士山が雲に隠れたら」は基準に含まれません。"},
{q:"ブレーキ用コンプレッサーの正常な空気圧の値は？",c:["0.7Mps前後","0.6Mps前後","0.8Mps前後","0.9Mps前後"],a:2,e:"0.8Mps前後が正常な値です。"},
{q:"電気室内のエアコン・ＵＰＳは24ｈつけたままか？",c:["はい","いいえ","営業時間中のみ","オペレシピの記載がない"],a:0,e:"24時間の運転となります。"},
{q:"立ち上げ時に発生するエラーいくつあるか？",c:["1つ","3つ","6つ","50"],a:2,e:"6つのエラーが発生します。"},
{q:"乗車姿勢について、誤っているものを選びなさい。",c:["頭をヘッドレスに押し付ける","安全バーを握り身体を支える","ふくらはぎを押し付ける","足を上下にゆらす"],a:3,e:"「足を上下にゆらす」は正しい姿勢に含まれません。"},
{q:"お客様のベルトセルフチェック方法の（　　）に入る語句を選びなさい。差し込み方向と（　　）方向に引っ張って確認。",c:["同じ","あらぬ","反対","飛び出す"],a:2,e:"差し込み方向と反対方向に引っ張って確認します。"},
{q:"2車両運転時、出発する際に確認する項目は？",c:["妖怪がででないか","怪物がででないか","おばけがででないか","非科学的なものは信じない"],a:2,e:"「おばけ」とは近接センサーの誤検知現象のことです。"},
{q:"安全ハーネスの調整が必要な際（全ロック時）はどうすればよいか？",c:["全ロックは開放不可能","力任せにこじあける","非常停止ボタンを押す","放送をかけてワンロック状態にする"],a:3,e:"放送をかけてワンロック状態にします。"},
{q:"非常降車時に使用する物品で、誤っているものを選べ。",c:["ヘルメット","スリッパ","墜落制止用器具","安全地帯"],a:3,e:"「安全地帯」は物品ではありません。"},
{q:"停止車両を動かす時の手順について正しい組み合わせを選びなさい。",c:["A：10回以上 B：１回押してすぐ手を離す","A：３回 B：長押しする","A：１回 B：連打する","A：口頭で B：撫でる"],a:0,e:"出発ブザーを10回以上鳴らし、出発ボタンを１回押してすぐ手を離します。"},
{q:"「ロックアウト」について正しいものを一つ選んでください。",c:["電源やボタンに「鍵」をすることで、第三者が操作できないようにする仕組みのこと。","危険エリアに「短い時間」入るのであれば鍵をしなくてもよい。","ロックアウトの解除は「お願いすれば」他のスタッフにさせてもよい。","急ぎの作業であれば、立入りカードに「名前」の記載は免除される。"],a:0,e:"ロックアウトとは、第三者が操作できないようにする仕組みです。"}
]},
{name:"FUJIYAMA",questions:[
{q:"正しい乗車姿勢は？",c:["頭をつける、背中をつける、前の安全バーに捕まる","足をつける、安全バーにつかまる、頭をつける","正面を向き、背中をつけて、安全バーにつかまり体を支える"],a:2,e:"正面を向き・背中をつけて・安全バーにつかまり体を支えます。"},
{q:"お客様のベルトセルフチェックで正しいものは？",c:["『引っ張ってください』と声を掛け、必ず黄色いチェックタグを持って引いてもらう。","『引っ張ってください』と声を掛け、ベルトの差し込み方向と同じ方向に引いてもらう。","『引っ張っても外れないことを確認してください』と声を掛け、ベルトの差し込み方向と反対方向に引いてもらう。","『引っ張っても外れないことを確認してください』と声を掛け、スタッフがベルトを引く。"],a:2,e:"差し込み方向と反対方向に引いてもらいます。"},
{q:"ポジション交代をしてはいけないタイミングは？",c:["確認作業（ベルト・安全バーの確認）の途中で交代をしてはいけない","車両が走行中に交代してはいけない","金属探知機中に交代してはいけない"],a:0,e:"確認作業の途中で交代をしてはいけません。"},
{q:"振分け案内の際、相席のルールで正しいものは？",c:["先頭のお客様はNo.14にご案内する。","乗車人数を２７人・２８人にする。","相席を強要する。"],a:1,e:"相席をお願いして27人・28人乗車にします。"},
{q:"ブレーキテスト実施時の【現地点検者】の点検内容で正しい組み合わせは？",c:["ボルトの脱落がないか・ライニングの変色や間に異物はないか・動作は素早いか・エアー漏れはないか","ボルトの脱落がないか・ライニングの破損や間に異物はないか・動作は揃っているか・エアー漏れはないか","ボルトの合いマークずれがないか・ライニングの破損や間に異物はないか・動作は揃っているか・エアー漏れはないか","ボルトの合いマークずれがないか・ライニングの破損やスキマは狭すぎないか・動作は揃っているか・エアー漏れはないか"],a:1,e:"ボルトの脱落・ライニングの破損や異物・動作の揃い・エアー漏れを確認します。"},
{q:"巻き上げ点検時の【オペレータ室操作担当者】の点検内容で正しい組み合わせは？",c:["直流モーター電流計の数値確認・直流モーター回転計の数値確認・頂上調速タイヤの作動確認","直流モーター電流計の数値確認・直流モーター回転計の数値確認・第一カーブ調速タイヤの作動確認","交流電圧計の数値確認・直流モーター回転計の数値確認・頂上調速タイヤの作動確認","空圧計の数値確認・直流モーター回転計の数値確認・頂上調速タイヤの作動確認"],a:0,e:"電流計・回転計の数値確認と頂上調速タイヤの動作確認です。"},
{q:"トラバーサヒーターの取り扱いについて正しいものは？",c:["２車両運転時は全てのヒーターを本線側レールに寄せる。","ヒーターのロックピンの設置状態は目視で確認する。","２車両運転時も各ヒーターのコンセントは挿したままでよい。","試運転開始前・トラバーサ操作の後・ヒーターを少しでも動かした後は、必ずアトラクション管理に設置状態OKの報告無線を入れてから運転する。"],a:3,e:"必ずアトラクション管理に報告無線を入れてから運転します。"},

const labels=["A","B","C","D","E","F"];
let curAtt=null,curQs=[],current=0,score=0,answers=[],answered=false;

function init(){
  let html='';
  DATA.categories.forEach((cat,ci)=>{
    html+=`<div class="category"><div class="cat-header" onclick="toggleCat(this)"><span class="arrow">&#9654;</span>${cat.name}<span class="badge">${cat.atts.length}機種</span></div><div class="cat-list">`;
    cat.atts.forEach(att=>{
      html+=`<button class="att-btn" onclick="startQuiz('${cat.name}','${att.name}')">${att.name}<span class="att-q">${att.questions.length}問</span></button>`;
    });
    html+='</div></div>';
  });
  document.getElementById('catList').innerHTML=html;
}

function toggleCat(el){el.classList.toggle('open')}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0)}

function startQuiz(catName,attName){
  const cat=DATA.categories.find(c=>c.name===catName);
  const att=cat.atts.find(a=>a.name===attName);
  curAtt=att;curQs=att.questions;current=0;score=0;answers=[];answered=false;
  document.getElementById('quizAttName').textContent=att.name;
  show('quiz');renderQuestion();
}

function renderQuestion(){
  answered=false;const q=curQs[current];
  document.getElementById('progressFill').style.width=((current+1)/curQs.length*100)+'%';
  document.getElementById('qNumber').textContent=`第 ${current+1} 問 / ${curQs.length} 問`;
  document.getElementById('scoreText').textContent=`正解数: ${score}`;
  let html=`<div class="question-box">${q.q}</div><div class="choices">`;
  q.c.forEach((c,i)=>{html+=`<div class="choice-btn" id="choice${i}" onclick="selectAnswer(${i})"><div class="choice-label">${labels[i]}</div><div class="choice-text">${c}</div><div class="choice-icon" id="icon${i}"></div></div>`;});
  html+='</div><div id="explanationArea"></div>';
  document.getElementById('quizBody').innerHTML=html;
}

function selectAnswer(idx){
  if(answered)return;answered=true;answers.push(idx);const q=curQs[current];const ok=idx===q.a;if(ok)score++;
  document.getElementById('scoreText').textContent=`正解数: ${score}`;
  q.c.forEach((_,i)=>{const btn=document.getElementById('choice'+i);btn.classList.add('disabled');
    if(i===q.a){btn.classList.add('correct');document.getElementById('icon'+i).textContent='\u2705';}
    else if(i===idx&&!ok){btn.classList.add('wrong');document.getElementById('icon'+i).textContent='\u274C';}
    else{btn.classList.add('dim');}
  });
  const nextLabel=current<curQs.length-1?'次の問題へ \u2192':'結果を見る \uD83C\uDFC1';
  document.getElementById('explanationArea').innerHTML=`<div class="explanation"><div class="result-label ${ok?'correct':'wrong'}">${ok?'\u2705 正解！':'\u274C 不正解...'}</div><p>${q.e}</p></div><button class="btn-next" onclick="nextQuestion()">${nextLabel}</button>`;
  document.querySelector('.explanation').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function nextQuestion(){if(current<curQs.length-1){current++;renderQuestion();window.scrollTo({top:0,behavior:'smooth'});}else{showResult();}}

function showResult(){
  show('result');const pct=Math.round(score/curQs.length*100);
  document.getElementById('resultAttName').textContent=curAtt.name;
  document.getElementById('resultScore').textContent=score;
  document.getElementById('resultTotal').textContent=`/ ${curQs.length}`;
  document.getElementById('percentText').textContent=`正答率: ${pct}%`;
  let grade,color;
  if(pct===100){grade='\uD83C\uDF89 合格！満点です！';color='#4c4';}
  else{grade='\u274C 不合格（満点のみ合格）';color='#c44';}
  document.getElementById('gradeText').textContent=grade;
  document.getElementById('gradeText').style.color=color;
  const fg=document.getElementById('scoreFg');fg.style.stroke=color;
  const circ=2*Math.PI*85;fg.style.strokeDasharray=circ;fg.style.strokeDashoffset=circ;
  setTimeout(()=>{fg.style.strokeDashoffset=circ*(1-score/curQs.length);},100);
  let dHtml='';
  curQs.forEach((q,i)=>{const ua=answers[i];const ok=ua===q.a;
    dHtml+=`<div class="detail-item"><div class="icon">${ok?'\u2705':'\u274C'}</div><div class="info"><div class="q">Q${i+1}: ${q.q}</div>${!ok?`<div class="ans wrong-ans">あなたの回答: ${q.c[ua]}</div><div class="ans correct-ans">正解: ${q.c[q.a]}</div>`:''}</div></div>`;
  });
  document.getElementById('detailsBox').innerHTML=dHtml;
  document.getElementById('detailsBox').style.display='none';
  document.querySelector('.toggle-details').innerHTML='\u25BC 詳細を見る';
}

function toggleDetails(){const box=document.getElementById('detailsBox');const btn=document.querySelector('.toggle-details');if(box.style.display==='none'){box.style.display='block';btn.innerHTML='\u25B2 詳細を隠す';}else{box.style.display='none';btn.innerHTML='\u25BC 詳細を見る';}}
function goHome(){show('home')}
init();
</script>
</body>
</html>
